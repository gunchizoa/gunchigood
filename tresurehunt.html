<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>보물찾기: 탐험가 버전 by 건치좋아 & 제미나이</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-color: #f0f0f0;
            font-family: 'Malgun Gothic', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .watermark {
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #7f8c8d;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 6px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            letter-spacing: 0.5px;
            line-height: 1.4;
            z-index: 1000;
            pointer-events: none;
            text-align: left;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .watermark-highlight { color: #3498db; }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }

        .screen { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            width: 100%;
            height: 100%;
            padding: 20px;
        }
        .screen.active { 
            display: flex !important; 
        }

        #lobby-title { font-size: 2.5rem; color: #2c3e50; margin-bottom: 30px; font-weight: 800; }
        .start-btn { background-color: #3498db; font-size: 1.3rem; padding: 12px 40px; }
        
        #difficulty-title { font-size: 1.8rem; color: #2c3e50; margin-bottom: 25px; }
        
        .diff-container { 
            display: flex; 
            gap: 15px; 
            flex-direction: column; 
            width: 100%; 
            max-width: 320px; 
            margin: 0 auto;
        }
        
        .diff-container .btn { width: 100%; padding: 16px; font-size: 1.15rem; }
        .btn-easy { background-color: #2ecc71; }
        .btn-normal { background-color: #f39c12; color: white; } 
        .btn-hard { background-color: #e74c3c; }
        .btn-veryhard { background-color: #8e44ad; }

        #status-box { text-align: center; margin-bottom: 15px; width: 100%; max-width: 100%; padding: 0 10px; }
        #status { font-size: 1.3rem; font-weight: bold; margin-bottom: 5px; transition: color 0.3s; color: #2c3e50; word-break: keep-all; }
        #log { font-size: 1rem; color: #7f8c8d; min-height: 24px; }
        
        .board {
            display: grid;
            border: 4px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            background-color: #fff;
            max-width: 88vw !important;  
            max-height: 88vw !important;
            margin: 0 auto;
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .cell.light { background-color: #e0e0e0; }
        .cell.dark { background-color: #bdc3c7; }
        
        .cell.revealed { background-color: #ffffff !important; border: 1px solid #ddd; }
        .cell.revealed.dark-revealed { background-color: #f5f5f5 !important; }
        
        /* 게임오버/맵 공개 시 부드러운 톤다운 배경 스타일 적용 */
        .cell.gameover-reveal.light { background-color: rgba(231, 76, 60, 0.12) !important; border: 1px solid rgba(231, 76, 60, 0.2); }
        .cell.gameover-reveal.dark { background-color: rgba(231, 76, 60, 0.22) !important; border: 1px solid rgba(231, 76, 60, 0.2); }
        
        .cell.selected { outline: 3px solid #3498db; outline-offset: -3px; z-index: 10; }
        .cell.revealed.hint-revealed { background-color: #e8f4fd !important; }

        .cell.movable::after {
            content: ''; width: 32%; height: 32%; background-color: rgba(46, 204, 113, 0.6);
            border-radius: 50%; position: absolute; z-index: 2;
        }
        .cell-text { position: absolute; z-index: 1; pointer-events: none; text-align: center; line-height: 1.2; width: 100%; font-weight: 800; }
        
        .player {
            width: 70%; height: 70%; background-color: #ff4757;
            border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 5; position: relative;
        }

        #game-controls { display: none; gap: 15px; margin-top: 20px; width: 100%; justify-content: center; flex-wrap: wrap; }
        #game-controls .btn { padding: 10px 20px; font-size: 1rem; }
        .btn-restart { background-color: #34495e; }
        .btn-to-title { background-color: #95a5a6; }
        
        /* 🔧 맵 보기 버튼 전용 컬러스킴 */
        .btn-showmap { background-color: #16a085; }
    </style>
</head>
<body>

    <div class="watermark">
        구상: 건치좋아<br>
        코딩: <span class="watermark-highlight">제미나이</span>
    </div>

    <div id="lobby-screen" class="screen active">
        <h1 id="lobby-title">보물찾기</h1>
        <button class="btn start-btn" onclick="showDifficultyScreen()">게임 시작</button>
    </div>

    <div id="difficulty-screen" class="screen">
        <h2 id="difficulty-title">난이도를 선택하세요</h2>
        <div class="diff-container">
            <button class="btn btn-easy" onclick="startGame('easy')">쉬움 (7x7)</button>
            <button class="btn btn-normal" onclick="startGame('normal')">보통 (9x9)</button>
            <button class="btn btn-hard" onclick="startGame('hard')">어려움 (11x11)</button>
            <button class="btn btn-veryhard" onclick="startGame('veryhard')">매우 어려움 (15x15)</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div id="status-box">
            <div id="status">플레이어를 클릭하여 이동을 시작하세요!</div>
            <div id="log">현재 난이도: 쉬움 (🔥 0연승)</div>
        </div>

        <div class="board" id="gameBoard"></div>

        <div id="game-controls">
            <button class="btn btn-showmap" id="showMapBtn" onclick="revealAllMap('win')">맵 보기</button>
            <button class="btn btn-restart" onclick="restartGame()">재시작</button>
            <button class="btn btn-to-title" onclick="goToTitle()">타이틀로</button>
        </div>
    </div>

    <script>
        const screens = {
            lobby: document.getElementById('lobby-screen'),
            difficulty: document.getElementById('difficulty-screen'),
            game: document.getElementById('game-screen')
        };
        const board = document.getElementById('gameBoard');
        const statusText = document.getElementById('status');
        const logText = document.getElementById('log');
        const gameControls = document.getElementById('game-controls');
        const showMapBtn = document.getElementById('showMapBtn');

        const DIFFICULTY_PRESETS = {
            easy: { size: 7, mine: 0.15, hint: 0.25, center: 3, name: "쉬움", color: "#2c3e50" },
            normal: { size: 9, mine: 0.20, hint: 0.22, center: 4, name: "보통", color: "#2c3e50" },
            hard: { size: 11, mine: 0.25, hint: 0.20, center: 5, name: "어려움", color: "#2c3e50" },
            veryhard: { size: 15, mine: 0.30, hint: 0.15, center: 7, name: "매우 어려움", color: "#8e44ad" }
        };
        
        let currentDifficulty = 'easy';
        let boardSize, cellSize, mineProbability, hintProbability;
        let playerPos = { row: 0, col: 0 };
        let treasurePos = { row: 0, col: 0 };
        
        let isSelected = false;
        let isGameOver = false;
        let cells = [];
        let mapData = [];
        let winStreak = 0;

        function changeScreen(targetScreen) {
            Object.values(screens).forEach(screen => {
                screen.classList.remove('active');
            });
            targetScreen.classList.add('active');
        }

        function showDifficultyScreen() {
            changeScreen(screens.difficulty);
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty;
            const preset = DIFFICULTY_PRESETS[difficulty];

            boardSize = preset.size;
            
            const maxBoardWidth = Math.min(window.innerWidth * 0.88, window.innerHeight * 0.65, 650); 
            cellSize = Math.floor(maxBoardWidth / boardSize);

            mineProbability = preset.mine;
            hintProbability = preset.hint;
            playerPos = { row: preset.center, col: preset.center };

            changeScreen(screens.game);
            initGameBoard();
        }

        function updateLogText(customText = null) {
            const preset = DIFFICULTY_PRESETS[currentDifficulty];
            if (customText) {
                logText.innerText = customText;
            } else {
                logText.innerText = `현재 난이도: ${preset.name} (🔥 ${winStreak}연승 중)`;
            }
        }

        function countSurroundingMines(row, col) {
            let count = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                        if (mapData[nr][nc] === 'mine') count++;
                    }
                }
            }
            return count;
        }

        function generateOptimizedMap(sRow, sCol) {
            let tempMap = Array.from({ length: boardSize }, () => Array(boardSize).fill('nothing'));

            do {
                treasurePos.row = Math.floor(Math.random() * boardSize);
                treasurePos.col = Math.floor(Math.random() * boardSize);
            } while (Math.abs(treasurePos.row - sRow) <= 1 && Math.abs(treasurePos.col - sCol) <= 1);
            tempMap[treasurePos.row][treasurePos.col] = 'treasure';

            let safeZoneTiles = [];
            for (let r = -1; r <= 1; r++) {
                for (let c = -1; c <= 1; c++) {
                    const nr = sRow + r;
                    const nc = sCol + c;
                    if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                        if (tempMap[nr][nc] !== 'treasure') {
                            tempMap[nr][nc] = 'start_safe'; 
                            if (!(nr === sRow && nc === sCol)) {
                                safeZoneTiles.push({ r: nr, c: nc });
                            }
                        }
                    }
                }
            }

            if (safeZoneTiles.length > 0) {
                const randomSafeTile = safeZoneTiles[Math.floor(Math.random() * safeZoneTiles.length)];
                tempMap[randomSafeTile.r][randomSafeTile.c] = 'guaranteed_hint';
            }

            let currR = sRow;
            let currC = sCol;
            while (currR !== treasurePos.row || currC !== treasurePos.col) {
                let moveVertical = Math.random() < 0.5;
                if (moveVertical && currR !== treasurePos.row) {
                    currR += (treasurePos.row > currR) ? 1 : -1;
                } else if (currC !== treasurePos.col) {
                    currC += (treasurePos.col > currC) ? 1 : -1;
                }
                if (tempMap[currR][currC] === 'nothing') {
                    tempMap[currR][currC] = 'path';
                }
            }

            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    if (tempMap[r][c] === 'nothing') {
                        const rand = Math.random();
                        if (rand < mineProbability) {
                            tempMap[r][c] = 'mine';
                        } else if (rand < mineProbability + hintProbability) {
                            tempMap[r][c] = 'hint';
                        }
                    } else if (tempMap[r][c] === 'path') {
                        tempMap[r][c] = Math.random() < hintProbability ? 'hint' : 'nothing';
                    } else if (tempMap[r][c] === 'guaranteed_hint') {
                        tempMap[r][c] = 'hint'; 
                    } else if (tempMap[r][c] === 'start_safe') {
                        tempMap[r][c] = 'nothing';
                    }
                }
            }
            return tempMap;
        }

        function initGameBoard() {
            const preset = DIFFICULTY_PRESETS[currentDifficulty];
            board.innerHTML = '';
            cells = [];
            isSelected = false;
            isGameOver = false;
            gameControls.style.display = 'none';
            showMapBtn.style.display = 'none'; // 기본 상태에서는 맵 보기 숨김

            statusText.innerText = "플레이어를 클릭하여 이동을 시작하세요!";
            statusText.style.color = preset.color; 
            updateLogText();

            board.style.gridTemplateColumns = `repeat(${boardSize}, ${cellSize}px)`;
            board.style.gridTemplateRows = `repeat(${boardSize}, ${cellSize}px)`;

            const { row: sRow, col: sCol } = playerPos;
            mapData = generateOptimizedMap(sRow, sCol);

            let calculatedFontSize = Math.max(cellSize * 0.32, 13);

            for (let r = 0; r < boardSize; r++) {
                cells[r] = [];
                for (let c = 0; c < boardSize; c++) {
                    const cell = document.createElement('div');
                    cell.className = `cell ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    cell.style.width = cell.style.height = `${cellSize}px`;
                    cell.style.fontSize = `${calculatedFontSize}px`;
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const textSpan = document.createElement('span');
                    textSpan.className = 'cell-text';
                    cell.appendChild(textSpan);

                    if (r === sRow && c === sCol) {
                        const player = document.createElement('div');
                        player.className = 'player';
                        player.id = 'player';
                        cell.appendChild(player);
                        cell.classList.add('revealed');
                        
                        const mineCount = countSurroundingMines(r, c);
                        textSpan.innerHTML = `<span style="color:#e74c3c;">💣${mineCount}</span>`;
                    }

                    cell.addEventListener('click', onCellClick);
                    board.appendChild(cell);
                    cells[r][c] = cell;
                }
            }
        }

        function onCellClick(e) {
            if (isGameOver) return;

            const clickedCell = e.currentTarget;
            const tRow = parseInt(clickedCell.dataset.row);
            const tCol = parseInt(clickedCell.dataset.col);

            if (!isSelected) {
                if (tRow === playerPos.row && tCol === playerPos.col) {
                    isSelected = true;
                    clickedCell.classList.add('selected');
                    statusText.innerText = "상하좌우 인접한 칸을 클릭하세요.";
                    showMovableTiles();
                }
                return;
            }

            if (tRow === playerPos.row && tCol === playerPos.col) {
                clearSelection();
                return;
            }

            const rowDiff = Math.abs(tRow - playerPos.row);
            const colDiff = Math.abs(tCol - playerPos.col);

            if ((rowDiff === 1 && colDiff === 0) || (rowDiff === 0 && colDiff === 1)) {
                const playerElement = document.getElementById('player');
                clickedCell.appendChild(playerElement);
                
                clickedCell.classList.add('revealed');
                if (clickedCell.classList.contains('dark')) clickedCell.classList.add('dark-revealed');

                playerPos = { row: tRow, col: tCol };
                clearSelection();
                checkEvent(tRow, tCol);
            } else {
                statusText.innerText = "한 칸씩만 움직일 수 있습니다!";
                clearSelection();
            }
        }

        function checkEvent(row, col) {
            const eventType = mapData[row][col];
            const currentCell = cells[row][col];
            const cellText = currentCell.querySelector('.cell-text');

            statusText.style.color = DIFFICULTY_PRESETS[currentDifficulty].color;

            if (eventType === 'treasure') {
                winStreak++;
                statusText.innerText = "🎉 보물을 찾았습니다! 승리! 🎉";
                statusText.style.color = "#2ecc71";
                updateLogText(`🔥 현재 ${winStreak}연승 달성 중!`);
                cellText.innerText = "👑";
                
                // 🔧 승리했을 때는 [맵 보기] 버튼을 활성화시켜 노출
                endGame(true);
            } 
            else if (eventType === 'mine') {
                winStreak = 0;
                statusText.innerText = "💥 쾅! 지뢰를 밟았습니다! 💥";
                statusText.style.color = "#e74c3c";
                updateLogText("연승 기록이 초기화되었습니다. (0연승)");
                currentCell.style.backgroundColor = "#ff8282";
                
                revealAllMap('lose');
                endGame(false);
            } 
            else if (eventType === 'hint') {
                const distance = Math.abs(row - treasurePos.row) + Math.abs(col - treasurePos.col);
                const mineCount = countSurroundingMines(row, col);
                
                currentCell.classList.add('hint-revealed');
                statusText.innerText = "💡 숨겨진 레이더 힌트 발견!";
                updateLogText(`보물 거리: [ ${distance}칸 ] | 주변 지뢰: [ ${mineCount}개 ]`);
                
                cellText.innerHTML = `<span style="color:#2980b9;">🧭${distance}</span><br><span style="color:#e74c3c; font-size:0.85em;">💣${mineCount}</span>`;
            } 
            else {
                const mineCount = countSurroundingMines(row, col);
                
                statusText.innerText = "안전한 일반 타일입니다.";
                updateLogText(`주변에 매설된 지뢰: [ ${mineCount}개 ]`);
                
                cellText.innerHTML = `<span style="color:#e74c3c;">💣${mineCount}</span>`;
            }
        }

        // 🔧 맵 개방 로직 고도화 (타입을 구분하여 문구 조절)
        function revealAllMap(type = 'lose') {
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    const cell = cells[r][c];
                    const isRevealed = cell.classList.contains('revealed');
                    const mapType = mapData[r][c];

                    if (!isRevealed) {
                        cell.classList.add('gameover-reveal');
                        const cellText = cell.querySelector('.cell-text');
                        
                        if (mapType === 'mine') {
                            cellText.innerText = "💣"; 
                        } else if (mapType === 'treasure') {
                            cellText.innerText = "👑"; 
                        } else if (mapType === 'hint') {
                            cellText.innerText = "🧭"; 
                        } else {
                            cellText.innerText = "";  
                        }
                    }
                }
            }
            
            if (type === 'win') {
                statusText.innerText = "🗺️ 전체 지도가 공개되었습니다!";
                statusText.style.color = "#16a085";
                showMapBtn.style.display = 'none'; // 한 번 누르면 버튼 숨김
            }
        }

        function showMovableTiles() {
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            directions.forEach(([dr, dc]) => {
                const nr = playerPos.row + dr;
                const nc = playerPos.col + dc;
                if (nr >= 0 && nr < boardSize && nc >= 0 && nc < boardSize) {
                    cells[nr][nc].classList.add('movable');
                }
            });
        }

        function clearSelection() {
            isSelected = false;
            for (let r = 0; r < boardSize; r++) {
                for (let c = 0; c < boardSize; c++) {
                    cells[r][c].classList.remove('selected', 'movable');
                }
            }
        }

        // 🔧 이겼을 때만 [맵 보기]가 나타나도록 분기 처리
        function endGame(isWin = false) {
            isGameOver = true;
            gameControls.style.display = 'flex';
            if (isWin) {
                showMapBtn.style.display = 'inline-block';
            } else {
                showMapBtn.style.display = 'none';
            }
        }

        function restartGame() {
            startGame(currentDifficulty);
        }

        function goToTitle() {
            changeScreen(screens.difficulty);
        }
    </script>
</body>
</html>
